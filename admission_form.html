<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B.Tech College Admission Form</title>
  </head>
  <body>
    <div>
      <h1>B.Tech College Admission</h1>
      <p>Registration Form</p>

      <form id="admissionForm">
        <!-- Full Name -->
        <div>
          <div>
            <label for="name">Full Name <span class="required">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              required
              placeholder="Enter your full name"
            />
          </div>
        </div>

        <!-- Email and Phone -->
        <div>
          <div>
            <label for="email"
              >Email Address <span class="required">*</span></label
            >
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="your@email.com"
            />
          </div>
          <div>
            <label for="phone"
              >Mobile Number <span class="required">*</span></label
            >
            <input
              type="tel"
              id="phone"
              name="phone"
              required
              placeholder="10-digit mobile number"
              pattern="[0-9]{10}"
            />
          </div>
        </div>

        <!-- 10th and 12th Marks -->
        <div>
          <div>
            <label for="tenth"
              >10th Marks (Percentage) <span class="required">*</span></label
            >
            <input
              type="number"
              id="tenth"
              name="tenth"
              required
              min="0"
              max="100"
              step="0.01"
              placeholder="0-100"
            />
          </div>
          <div>
            <label for="twelfth"
              >12th Marks (Percentage) <span class="required">*</span></label
            >
            <input
              type="number"
              id="twelfth"
              name="twelfth"
              required
              min="0"
              max="100"
              step="0.01"
              placeholder="0-100"
            />
          </div>
        </div>

        <!-- JEE and Course -->
        <div>
          <div>
            <label for="jee">JEE Marks <span class="required">*</span></label>
            <input
              type="number"
              id="jee"
              name="jee"
              required
              min="0"
              max="300"
              placeholder="0-300"
            />
          </div>
          <div>
            <label for="course">Course <span class="required">*</span></label>
            <select id="course" name="course" required>
              <option value="">Select Course</option>
              <option value="btech">B.Tech</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <!-- Stream (for B.Tech) -->
        <div id="streamContainer">
          <label for="stream">Stream <span class="required">*</span></label>
          <select id="stream" name="stream">
            <option value="">Select Stream</option>
            <option value="cse">Computer Science & Engineering</option>
            <option value="ece">Electronics & Communication Engineering</option>
            <option value="me">Mechanical Engineering</option>
            <option value="ce">Civil Engineering</option>
            <option value="ee">Electrical Engineering</option>
            <option value="aero">Aerospace Engineering</option>
            <option value="che">Chemical Engineering</option>
            <option value="bio">Biotechnology</option>
          </select>
        </div>

        <!-- Address -->
        <div>
          <div>
            <label for="address">Address <span class="required">*</span></label>
            <textarea
              id="address"
              name="address"
              required
              placeholder="Enter your full address"
            ></textarea>
          </div>
        </div>

        <!-- Submit and Reset Buttons -->
        <button type="submit">Submit Application</button>
        <button type="reset">Clear Form</button>
      </form>
    </div>
  </body>
</html>
